services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./CompStore:/app
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./CompStore:/app:ro
    depends_on:
      - web
